services:
  postgres:
    image: postgres:17-alpine
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: library_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d library_db" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  db_data: