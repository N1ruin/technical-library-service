databaseChangeLog:
  - changeSet:
      id: 0
      author: niruin
      comment: init schema
      changes:
        - sql:
            sql: CREATE SCHEMA library

  - changeSet:
      id: 1
      author: niruin
      comment: initial database
      changes:
        - createTable:
            schemaName: library
            tableName: equipment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: index
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(200)
              - column:
                  name: image_name
                  type: VARCHAR(255)
              - column:
                  name: type
                  type: VARCHAR(30)
              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"

        - createTable:
            schemaName: library
            tableName: material
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(300)
              - column:
                  name: standard
                  type: VARCHAR(255)
              - column:
                  name: supplier_code
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"

              - addUniqueConstraint:
                  schemaName: library
                  tableName: material
                  constraintName: name_standard_unique_constr
                  columnNames: name, standard

        - createTable:
            schemaName: library
            tableName: safety_instruction
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(200)
              - column:
                  name: created_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"

        - createTable:
            tableName: transaction_outbox
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: outbox_type
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false