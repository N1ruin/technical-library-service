spring:
  application:
    name: technical-library-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/library_db
    username: root
    password: root
  jpa:
    show-sql: true
    properties:
      hibernate:
        default_schema: library
debug: false

server:
  port: 8082

minio:
  endpoint: http://localhost:9000/
  user: admin
  password: adminpass
  bucketName: equipments
  maxFileSize: 2097152